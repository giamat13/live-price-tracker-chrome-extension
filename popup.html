<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 400px; padding: 15px; font-family: sans-serif; text-align: center; }
    button { 
      width: 100%; padding: 12px; border: none; cursor: pointer; 
      border-radius: 8px; font-weight: bold; margin-bottom: 8px;
    }
    #startSelection { background-color: #4285f4; color: white; }
    #deleteTrack { background-color: #ea4335; color: white; display: none; }
    #viewHistory { background-color: #34a853; color: white; display: none; }
    #manageGroups { background-color: #ff6d00; color: white; display: none; }
    button:hover { opacity: 0.9; }
    p { font-size: 11px; color: #666; }
    .toggle-container {
      margin: 12px 0;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      text-align: right;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #333;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4285f4;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    /* גרף */
    #chartContainer {
      display: none;
      margin-top: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    #chartContainer.active {
      display: block;
    }
    #priceChart {
      width: 100%;
      height: 250px;
    }
    .stats {
      margin-top: 10px;
      font-size: 11px;
      color: #555;
      text-align: right;
      padding: 8px;
      background: white;
      border-radius: 6px;
    }
    .stats div {
      margin: 4px 0;
    }
    .stat-label {
      font-weight: bold;
      color: #333;
    }
    #clearHistory {
      background-color: #fbbc04;
      color: #333;
      font-size: 11px;
      padding: 6px;
      margin-top: 8px;
    }
    
    /* אזור AI */
    #aiAnalysisContainer {
      display: none;
      margin-top: 15px;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      color: white;
    }
    #aiAnalysisContainer.active {
      display: block;
    }
    #aiAnalysisContent {
      font-size: 12px;
      line-height: 1.6;
    }
    .ai-section {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
    }
    .ai-label {
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }
    .ai-value {
      font-size: 14px;
    }
    .ai-score {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }
    .ai-recommendation {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      padding: 10px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      margin-top: 10px;
    }
    .ai-loading {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.8);
    }

    /* קבוצות מוצר */
    #groupPanel {
      display: none; margin-top: 12px; padding: 12px;
      background: #fff3e0; border-radius: 8px;
      border: 1px solid #ffcc80; text-align: right;
    }
    #groupPanel.active { display: block; }
    #groupPanel h4 { margin: 0 0 10px 0; font-size: 13px; color: #e65100; }
    .group-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; margin-bottom: 6px; background: white;
      border-radius: 6px; border: 2px solid #ffe0b2; transition: all 0.2s;
    }
    .group-item.in-this-group { border-color: #ff6d00; background: #fff3e0; }
    .group-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .group-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .group-info { min-width: 0; }
    .group-name { font-size: 12px; font-weight: bold; color: #333; }
    .group-urls { font-size: 10px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .group-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-sm { width: auto; padding: 4px 8px; font-size: 10px; border-radius: 4px; margin: 0; cursor: pointer; border: none; font-weight: bold; }
    .btn-join { background: #34a853; color: white; }
    .btn-leave { background: #ea4335; color: white; }
    .btn-delete-group { background: #9e9e9e; color: white; }
    .btn-view-group { background: #1976d2; color: white; }
    #newGroupInput {
      width: 100%; padding: 8px; border: 1px solid #ffcc80;
      border-radius: 6px; font-size: 12px; margin-bottom: 6px;
      box-sizing: border-box; direction: rtl;
    }
    #createGroupBtn { background: #ff6d00; color: white; margin-bottom: 10px; }
    .divider { border: none; border-top: 1px solid #ffcc80; margin: 8px 0; }
    .no-groups-msg { font-size: 11px; color: #999; text-align: center; padding: 8px; }
    #chartTitle { font-size: 11px; color: #888; margin-bottom: 6px; }
  </style>
</head>
<body>
  <button id="startSelection">בחר אלמנט למעקב</button>
  <p style="font-size: 10px; color: #666; margin: -5px 0 10px 0;">💡 טיפ: עדיף ללחוץ על קונטיינר שלם (div/section)</p>
  <button id="deleteTrack">מחק מעקב מהדף</button>
  <button id="viewHistory">📊 הצג היסטורית מחיר</button>
  <button id="manageGroups">📦 השווה מחיר בין אתרים</button>
  <button id="aiSettings" style="background-color: #9c27b0; color: white; display: block;">🤖 הגדרות AI</button>
  
  <div class="toggle-container">
    <label class="toggle-label">
      <span>התראות על הנחות</span>
      <label class="toggle-switch">
        <input type="checkbox" id="discountToggle">
        <span class="slider"></span>
      </label>
    </label>
    <p style="margin: 5px 0 0 0; font-size: 10px; color: #999;">זיהוי מילות מפתח כמו SAVE, DISCOUNT</p>
  </div>
  
  <p id="statusText">אין מעקב פעיל</p>
  
  <!-- פאנל ניהול קבוצות -->
  <div id="groupPanel">
    <h4>📦 השוואת מחיר בין אתרים</h4>
    <input type="text" id="newGroupInput" placeholder="שם המוצר (למשל: אייפון 15 פרו)">
    <button id="createGroupBtn">➕ צור קבוצה חדשה והוסף דף זה</button>
    <hr class="divider">
    <div style="font-size:11px;color:#888;margin-bottom:6px">קבוצות קיימות:</div>
    <div id="existingGroups"></div>
  </div>

  <!-- אזור הגרף -->
  <div id="chartContainer">
    <h3 style="margin: 5px 0 4px 0; font-size: 14px; color: #333;">📈 היסטורית מחירים</h3>
    <div id="chartTitle"></div>
    <canvas id="priceChart"></canvas>
    <div class="stats" id="statsContainer"></div>
    <button id="clearHistory">🗑️ נקה היסטוריה</button>
  </div>
  
  <!-- אזור ניתוח AI -->
  <div id="aiAnalysisContainer">
    <h3 style="margin: 5px 0 10px 0; font-size: 14px; color: #333;">🤖 ניתוח AI</h3>
    <div id="aiAnalysisContent"></div>
    <button id="refreshAI" style="background-color: #9c27b0; color: white; font-size: 11px; padding: 6px; margin-top: 8px;">🔄 רענן ניתוח</button>
  </div>
  
  <script src="chart.umd.min.js"></script>
  <script src="currency.js"></script>
  <script src="ai-analyzer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
