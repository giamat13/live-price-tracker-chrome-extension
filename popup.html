<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 15px; font-family: sans-serif; text-align: center; }
    button { 
      width: 100%; padding: 12px; border: none; cursor: pointer; 
      border-radius: 8px; font-weight: bold; margin-bottom: 8px;
    }
    #startSelection { background-color: #4285f4; color: white; }
    #deleteTrack { background-color: #ea4335; color: white; display: none; }
    button:hover { opacity: 0.9; }
    p { font-size: 11px; color: #666; }
    .toggle-container {
      margin: 12px 0;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      text-align: right;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #333;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4285f4;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <button id="startSelection">בחר אלמנט למעקב</button>
  <button id="deleteTrack">מחק מעקב מהדף</button>
  
  <div class="toggle-container">
    <label class="toggle-label">
      <span>התראות על הנחות</span>
      <label class="toggle-switch">
        <input type="checkbox" id="discountToggle">
        <span class="slider"></span>
      </label>
    </label>
    <p style="margin: 5px 0 0 0; font-size: 10px; color: #999;">זיהוי מילות מפתח כמו SAVE, DISCOUNT</p>
  </div>
  
  <p id="statusText">אין מעקב פעיל</p>
  <script src="popup.js"></script>
</body>
</html>
